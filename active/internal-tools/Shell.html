<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <?!= include('Styles'); ?>
</head>
<body>

  <div class="it-layout">

    <!-- Sidebar: built entirely from NAV_CONFIG server-side. Adding tool #5
         means adding one entry in Config.gs — nothing here changes. -->
    <nav class="it-sidebar">
      <img class="it-logo" src="https://1977632.fs1.hubspotusercontent-na1.net/hubfs/1977632/Images/Logos/logo-mobile@2x.png" alt="Wilderness">

      <? NAV_CONFIG.forEach(function(section) { ?>
        <div class="it-nav-section" data-section="<?= section.section ?>">
          <div class="it-nav-section-label">
            <span><?= section.section ?></span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
              <polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="it-nav-items">
            <? section.items.forEach(function(item, idx) { ?>
              <div class="it-nav-item<?= (section === NAV_CONFIG[0] && idx === 0) ? ' active' : '' ?>"
                   data-tool="<?= item.id ?>"
                   data-width="<?= item.contentWidth ?>"
                   onclick="ITRouter.navigate('<?= item.id ?>', '<?= item.partial ?>', '<?= item.contentWidth ?>')">
                <span class="it-nav-icon"><?!= item.icon ?></span>
                <span><?= item.label ?></span>
              </div>
            <? }); ?>
          </div>
        </div>
      <? }); ?>

      <? var currentUser = getSidebarUserInfo(); ?>
      <div class="it-nav-footer">
        <div class="it-avatar"><?= currentUser.initials ?></div>
        <div class="it-user-info">
          <div class="it-user-name"><?= currentUser.displayName ?></div>
          <div class="it-user-email"><?= currentUser.email ?></div>
        </div>
      </div>
    </nav>

    <!-- Content area: partials are fetched via google.script.run and swapped
         in here client-side (see Router.html) — no full page reload. -->
    <main class="it-content it-content-<?= NAV_CONFIG[0].items[0].contentWidth ?>" id="itContent">
      <div class="it-loading">Loading…</div>
    </main>

  </div>

  <!-- Shared confirm/notify modal — lives here (not per-partial) so it
       persists across tool navigation and every tool can use it via the
       global ITModal object. Apps Script's IFRAME sandbox mode does not
       support native alert()/confirm()/prompt() — they silently no-op —
       so this replaces those everywhere in the app. -->
  <div id="itModalOverlay" class="it-modal-overlay">
    <div class="it-modal-card">
      <h3 id="itModalTitle"></h3>
      <p id="itModalMessage"></p>
      <div class="it-modal-actions">
        <button class="it-btn it-btn-ghost" id="itModalCancelBtn">Cancel</button>
        <button class="it-btn it-btn-primary" id="itModalConfirmBtn">OK</button>
      </div>
    </div>
  </div>

  <?!= include('Modal'); ?>
  <?!= include('Router'); ?>

</body>
</html>
