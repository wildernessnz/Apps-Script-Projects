<div class="it-tool-header">
  <h1>Relo Job Calculator</h1>
  <p class="it-tool-subtitle">Learn how this calculator works <a href="https://wildernessnz.atlassian.net/wiki/spaces/AS/pages/4179197970/Info+Relocation+Rates+Calculator" target="_blank" class="it-link">here</a>.</p>
</div>

<div class="it-card">
  <form class="it-card-body" id="rrForm" style="display:flex; flex-direction:column; gap:20px;">

    <div class="it-form-row">
      <div class="it-field">
        <label class="it-label" for="rrJobStart">Job start (arrival at base) <span class="it-tooltip" tabindex="0"><span class="it-tooltip-icon">ⓘ</span><span class="it-tooltip-content">Arrival at base</span></span></label>
        <input type="datetime-local" id="rrJobStart" class="it-input" required>
      </div>
      <div style="display:flex; align-items:center; gap:10px; height:44px;">
        <button type="button" class="it-toggle" id="rrOvernight" data-on="false"><div class="it-toggle-thumb"></div></button>
        <span style="font-size:14px; font-weight:700;">Overnight</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px; height:44px;">
        <button type="button" class="it-toggle" id="rrPublicHoliday" data-on="false"><div class="it-toggle-thumb"></div></button>
        <span style="font-size:14px; font-weight:700;">Public holiday</span>
      </div>
    </div>

    <div id="rrLegs"></div>

    <div class="it-form-row">
      <button type="button" class="it-btn-utility" id="rrAddStopBtn">+ Add Stop</button>
    </div>

    <div class="it-form-row" style="border-top:1px solid var(--color-border-light); padding-top:20px;">
      <div class="it-field">
        <label class="it-label">Flight bus/duration (if applicable)</label>
        <div class="it-duration" data-duration="rrFlightDuration">
          <input type="number" min="0" value="0" class="it-duration-input" data-unit="h"><span>h</span>
          <span style="opacity:0.4;">:</span>
          <input type="number" min="0" max="59" value="0" class="it-duration-input" data-unit="m"><span>m</span>
        </div>
      </div>
      <div class="it-field">
        <label class="it-label">Delay (if applicable) <span class="it-tooltip" tabindex="0"><span class="it-tooltip-icon">ⓘ</span><span class="it-tooltip-content">Add extra time for delays etc</span></span></label>
        <div class="it-duration" data-duration="rrDelayDuration">
          <input type="number" min="0" value="0" class="it-duration-input" data-unit="h"><span>h</span>
          <span style="opacity:0.4;">:</span>
          <input type="number" min="0" max="59" value="0" class="it-duration-input" data-unit="m"><span>m</span>
        </div>
      </div>
      <button type="submit" class="it-btn it-btn-primary" id="rrCalculateBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22l-4-9-9-4 20-7z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="rrCalculateBtnLabel">Calculate</span>
      </button>
    </div>

  </form>
</div>

<div class="it-card" id="rrResultsCard" style="display:none; margin-top: var(--it-content-gap);">
  <div class="it-card-header">
    <span style="display:flex; align-items:center; gap:8px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="var(--color-dusk-sky)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2v6h6" stroke="var(--color-dusk-sky)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="13" x2="16" y2="13" stroke="var(--color-dusk-sky)" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="17" x2="16" y2="17" stroke="var(--color-dusk-sky)" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Relocation Job Offer</span>
    </span>
  </div>
  <div class="it-card-body" style="display:flex; flex-direction:column; gap:0;">
    <div class="rr-row"><span>Job start date and time</span><span id="rrOutJobStart"></span></div>
    <div class="rr-row"><span>Estimated hours of work (driving, public transport)</span><span id="rrOutEstimatedHours"></span></div>
    <div class="rr-row" id="rrRowPublicHoliday" style="display:none;"><span>Public holiday rate</span><span>1.5x</span></div>
    <div class="rr-row"><span>Rest time</span><span id="rrOutRestDescription" class="rr-description"></span></div>
    <div class="rr-row"><span><strong>Base pay</strong></span><span><strong id="rrOutPayOffered"></strong></span></div>
    <div class="rr-row"><span><strong>Extras</strong></span><span></span></div>
    <div class="rr-row" id="rrRowDelay" style="display:none;"><span>Delay</span><span id="rrOutDelay"></span></div>
    <div class="rr-row" id="rrRowMeal" style="display:none;"><span>Meal allowance</span><span id="rrOutMeal"></span></div>
    <div class="rr-row" id="rrRowRest" style="display:none;"><span>Rest break(s)</span><span id="rrOutRest"></span></div>
    <div class="rr-row rr-row-total"><span><strong>Total pay</strong></span><span><strong id="rrOutTotal"></strong></span></div>
  </div>
</div>

<script>
(function () {
  function toggle(id) {
    const btn = document.getElementById(id);
    btn.addEventListener('click', function () {
      const isOn = btn.dataset.on === 'true';
      btn.dataset.on = (!isOn).toString();
      btn.classList.toggle('on', !isOn);
    });
  }
  toggle('rrOvernight');
  toggle('rrPublicHoliday');

  function getDurationMinutes(containerSelector) {
    const container = document.querySelector('[data-duration="' + containerSelector + '"]');
    const h = Number(container.querySelector('[data-unit="h"]').value) || 0;
    const m = Number(container.querySelector('[data-unit="m"]').value) || 0;
    return (h * 60) + m;
  }

  function getDurationMinutesFromLeg(leg) {
    const h = Number(leg.querySelector('[data-unit="h"]').value) || 0;
    const m = Number(leg.querySelector('[data-unit="m"]').value) || 0;
    return (h * 60) + m;
  }

  // ── Add/remove stop legs ────────────────────────────────────────────────
  // Legs are built dynamically, capped at 3 (matches the original: one base
  // leg plus up to 2 extra stops). Every row shares the same trailing
  // arrow/duration/delete-icon layout so columns stay aligned regardless of
  // how many stops are currently shown.
  const rrLegsContainer = document.getElementById('rrLegs');
  const RR_MAX_LEGS = 3;
  let rrLegUid = 0;

  function relabelLegs() {
    const legs = rrLegsContainer.querySelectorAll('.rr-leg');
    legs.forEach(function (leg, index) {
      leg.querySelector('.rr-leg-departure-label').textContent = index === 0 ? 'Leaving from' : 'Departure';
      leg.querySelector('.rr-leg-destination-label').textContent = index === 0 ? 'Driving to' : 'Destination';
      leg.querySelector('.it-btn-icon-delete').disabled = legs.length === 1;
    });
    document.getElementById('rrAddStopBtn').style.display = legs.length >= RR_MAX_LEGS ? 'none' : 'inline-flex';
  }

  function addLeg() {
    if (rrLegsContainer.querySelectorAll('.rr-leg').length >= RR_MAX_LEGS) return;
    rrLegUid += 1;
    const uid = rrLegUid;
    const leg = document.createElement('div');
    leg.className = 'rr-leg';
    leg.innerHTML =
      '<div class="it-field rr-leg-field">' +
        '<label class="it-label rr-leg-departure-label" for="rrDeparture' + uid + '"></label>' +
        '<input type="text" id="rrDeparture' + uid + '" class="it-input" placeholder="Type name of location" required>' +
      '</div>' +
      '<div class="rr-leg-arrow" aria-hidden="true">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '</div>' +
      '<div class="it-field rr-leg-field">' +
        '<label class="it-label rr-leg-destination-label" for="rrDestination' + uid + '"></label>' +
        '<input type="text" id="rrDestination' + uid + '" class="it-input" placeholder="Type name of location" required>' +
      '</div>' +
      '<div class="it-field">' +
        '<label class="it-label">Duration</label>' +
        '<div class="it-duration">' +
          '<input type="number" min="0" value="0" class="it-duration-input" data-unit="h"><span>h</span>' +
          '<span style="opacity:0.4;">:</span>' +
          '<input type="number" min="0" max="59" value="0" class="it-duration-input" data-unit="m"><span>m</span>' +
        '</div>' +
      '</div>' +
      '<button type="button" class="it-btn-icon-delete" aria-label="Remove stop">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '</button>';

    leg.querySelector('.it-btn-icon-delete').addEventListener('click', function () {
      if (rrLegsContainer.querySelectorAll('.rr-leg').length === 1) return;
      leg.remove();
      relabelLegs();
    });

    rrLegsContainer.appendChild(leg);
    relabelLegs();
  }

  document.getElementById('rrAddStopBtn').addEventListener('click', addLeg);

  addLeg();

  // ── Calculate ──────────────────────────────────────────────────────────
  function formatDateTime(d) {
    return new Date(d).toLocaleString('en-NZ', { day: '2-digit', month: '2-digit', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function renderResults(jobRate) {
    document.getElementById('rrOutJobStart').textContent = formatDateTime(jobRate.startDate);
    document.getElementById('rrOutEstimatedHours').textContent = jobRate.estimatedHours + 'h';
    document.getElementById('rrOutPayOffered').textContent = '$' + jobRate.payOffered;
    document.getElementById('rrOutDelay').textContent = '$' + jobRate.delayPay;
    document.getElementById('rrOutMeal').textContent = '$' + jobRate.mealAllowance;
    document.getElementById('rrOutRest').textContent = '$' + jobRate.restPay;
    document.getElementById('rrOutTotal').textContent = '$' + jobRate.totalPayOffered;
    document.getElementById('rrOutRestDescription').textContent = jobRate.restDescription || '—';

    document.getElementById('rrRowMeal').style.display  = Number(jobRate.mealAllowance) > 0 ? 'flex' : 'none';
    document.getElementById('rrRowDelay').style.display = Number(jobRate.delayPay) > 0 ? 'flex' : 'none';
    document.getElementById('rrRowRest').style.display  = Number(jobRate.restPay) > 0 ? 'flex' : 'none';
    document.getElementById('rrRowPublicHoliday').style.display = jobRate.publicHoliday ? 'flex' : 'none';

    document.getElementById('rrResultsCard').style.display = 'block';
  }

  // Submit only fires once the browser's own required-field validation has
  // passed — an empty Job Start, Leaving From, or Driving To blocks
  // submission and shows the native tooltip automatically.
  document.getElementById('rrForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const departureDate = document.getElementById('rrJobStart').value;
    const overnight     = document.getElementById('rrOvernight').dataset.on === 'true';
    const publicHoliday = document.getElementById('rrPublicHoliday').dataset.on === 'true';

    const legs = Array.from(rrLegsContainer.querySelectorAll('.rr-leg'));
    const departure    = legs[0].querySelector('input[type="text"]').value;
    const destination  = legs[legs.length - 1].querySelectorAll('input[type="text"]')[1].value;
    const tripDuration = legs.reduce(function (sum, leg) { return sum + getDurationMinutesFromLeg(leg); }, 0);

    const flightDuration = getDurationMinutes('rrFlightDuration');
    const delayDuration  = getDurationMinutes('rrDelayDuration');

    const btn = document.getElementById('rrCalculateBtn');
    const label = document.getElementById('rrCalculateBtnLabel');
    btn.disabled = true;
    label.textContent = 'Calculating…';

    google.script.run
      .withSuccessHandler(function (json) {
        btn.disabled = false;
        label.textContent = 'Calculate';
        renderResults(JSON.parse(json));
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        label.textContent = 'Calculate';
        ITModal.notify('Could not calculate: ' + err.message, 'Error');
      })
      .getJobRates(departure, destination, departureDate, overnight, tripDuration, flightDuration, delayDuration, publicHoliday);
  });
})();
</script>
