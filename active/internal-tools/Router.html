<script>
  const ITRouter = (function () {

    /**
     * Replaces #itContent's children using createContextualFragment rather
     * than innerHTML — innerHTML silently does NOT execute embedded <script>
     * tags, which every tool partial relies on for its own init logic.
     * createContextualFragment does execute them.
     * @param {string} html
     */
    function setContent(html) {
      const content = document.getElementById('itContent');
      content.innerHTML = '';
      const range = document.createRange();
      range.selectNode(content);
      const fragment = range.createContextualFragment(html);
      content.appendChild(fragment);
    }

    function setActiveNavItem(toolId) {
      document.querySelectorAll('.it-nav-item').forEach(function (el) {
        el.classList.toggle('active', el.dataset.tool === toolId);
      });
    }

    function setContentWidth(width) {
      const content = document.getElementById('itContent');
      content.classList.remove('it-content-narrow', 'it-content-wide');
      if (width) content.classList.add('it-content-' + width);
    }

    function navigate(toolId, partialName, contentWidth) {
      setActiveNavItem(toolId);
      setContentWidth(contentWidth);
      setContent('<div class="it-loading"><div class="it-spinner"></div><span>Loading…</span></div>');

      google.script.run
        .withSuccessHandler(setContent)
        .withFailureHandler(function (err) {
          setContent('<div class="it-error">Could not load this tool: ' + err.message + '</div>');
        })
        .getToolContent(partialName);
    }

    return { navigate, setContent, setContentWidth };
  })();

  // Load the first (active) nav item's content on initial page render.
  document.addEventListener('DOMContentLoaded', function () {
    const firstItem = document.querySelector('.it-nav-item.active');
    if (firstItem) {
      ITRouter.setContentWidth(firstItem.dataset.width);
      google.script.run
        .withSuccessHandler(ITRouter.setContent)
        .withFailureHandler(function (err) {
          ITRouter.setContent('<div class="it-error">Could not load this tool: ' + err.message + '</div>');
        })
        .getToolContentForNavId(firstItem.dataset.tool);
    }
  });
</script>
