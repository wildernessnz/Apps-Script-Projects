  /* ── DESIGN TOKENS — ported from colors_and_type.css + internal-tools.css ── */
  :root {
    --color-dusk-sky:        #263450;
    --color-electric-blue:   #006388;
    --color-organic-green:   #67B65B;
    --color-ruby-red:        #FB504E;
    --color-beige-60:        #FBF7EF;
    --color-text-primary:    #263450;
    --color-text-muted:      #939AA8;
    --color-border-light:    #EBEBEB;
    --color-border-form:     #CBD5E1;

    --it-sidebar-width:      240px;
    --it-sidebar-bg:         var(--color-dusk-sky);
    --it-sidebar-radius:     24px;
    --it-nav-item-radius:    12px;
    --it-nav-item-active-bg: rgba(255,255,255,0.12);
    --it-nav-item-hover-bg:  rgba(255,255,255,0.08);
    --it-nav-item-color:     rgba(255,255,255,0.6);
    --it-nav-item-active-color: #ffffff;
    --it-nav-section-color:  rgba(255,255,255,0.35);
    --it-nav-divider:        rgba(255,255,255,0.1);
    --it-nav-font-size:      13px;

    --it-card-radius:        16px;
    --it-card-header-padding: 14px 20px;
    --it-card-body-padding:  20px;
    --it-card-divider:       var(--color-border-light);
    --it-section-label-size: 12px;
    --it-section-label-color: var(--color-dusk-sky);

    --it-layout-padding:     12px;
    --it-layout-gap:         12px;
    --it-content-gap:        16px;

    --it-input-height:       44px;
    --it-input-radius:       999px;
    --it-input-border:       1px solid var(--color-border-form);
    --it-input-padding:      0 16px;
    --it-input-font-size:    14px;
    --it-label-font-size:    11px;
    --it-label-color:        var(--color-text-muted);

    --it-btn-height:         44px;
    --it-btn-radius:         999px;
    --it-btn-font-size:      13px;
    --it-btn-padding:        0 22px;
    --it-btn-primary-bg:     var(--color-organic-green);
    --it-btn-nav-bg:         var(--color-dusk-sky);

    --it-table-header-bg:    var(--color-dusk-sky);
    --it-table-row-hover-bg: var(--color-beige-60);

    --it-badge-bg:           var(--color-beige-60);
    --it-badge-color:        var(--color-dusk-sky);

    /* NOTE: brand font is Averta — not embedded yet, see Phase 0 README.
       Falling back to system-ui until fonts/logo hosting is decided. */
    --font-brand: 'Averta', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-brand);
    background: var(--color-beige-60);
    color: var(--color-text-primary);
  }

  /* ── LAYOUT ── */
  .it-layout { display: flex; gap: var(--it-layout-gap); padding: var(--it-layout-padding); min-height: 100vh; }

  /* ── SIDEBAR ── */
  .it-sidebar {
    width: var(--it-sidebar-width); flex-shrink: 0;
    background: var(--it-sidebar-bg); border-radius: var(--it-sidebar-radius);
    padding: 20px; display: flex; flex-direction: column; gap: 4px;
    overflow: hidden;
  }
  .it-logo {
    max-height: 24px; max-width: 100%; width: auto; height: auto;
    object-fit: contain; object-position: left center;
    filter: brightness(0) invert(1); margin-bottom: 16px; display: block;
  }

  .it-nav-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--it-nav-section-color); padding: 8px 8px 6px;
    display: flex; align-items: center; justify-content: space-between; cursor: pointer;
  }
  .it-nav-items { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }

  .it-nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: var(--it-nav-item-radius); color: var(--it-nav-item-color);
    font-size: var(--it-nav-font-size); font-weight: 700; cursor: pointer;
    transition: background 150ms ease, color 150ms ease;
  }
  .it-nav-item:hover { background: var(--it-nav-item-hover-bg); }
  .it-nav-item.active { background: var(--it-nav-item-active-bg); color: var(--it-nav-item-active-color); }
  .it-nav-icon { width: 14px; height: 14px; flex-shrink: 0; }

  .it-nav-footer {
    margin-top: auto; padding-top: 12px; border-top: 1px solid var(--it-nav-divider);
    display: flex; align-items: center; gap: 8px;
  }
  .it-avatar {
    width: 26px; height: 26px; border-radius: 999px; background: rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .it-user-info { min-width: 0; overflow: hidden; }
  .it-user-name { font-size: 12px; font-weight: 700; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .it-user-email { font-size: 11px; color: rgba(255,255,255,0.5); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── CONTENT AREA ── */
  .it-content { flex: 1; min-width: 0; padding: 32px 40px 32px 56px; }
  .it-content-narrow { max-width: 860px; }
  .it-content-wide { max-width: 1000px; }
  .it-loading, .it-error { padding: 40px; color: var(--color-text-muted); font-size: 14px; }
  .it-error { color: #B8860B; }

  .it-placeholder {
    background: #fff; border-radius: var(--it-card-radius); padding: 48px 32px; text-align: center;
    max-width: 480px; margin: 40px auto;
  }
  .it-placeholder-icon { font-size: 32px; margin-bottom: 12px; }
  .it-placeholder h2 { font-size: 20px; margin-bottom: 8px; color: var(--color-dusk-sky); }
  .it-placeholder p { font-size: 13px; color: var(--color-text-muted); line-height: 1.6; }

  /* ── TOOL HEADER ── */
  .it-tool-header { margin-bottom: 20px; }
  .it-tool-header h1 { font-size: 28px; font-weight: 700; color: var(--color-dusk-sky); margin-bottom: 4px; }
  .it-tool-subtitle { font-size: 14px; color: var(--color-text-muted); }

  /* ── CARDS ── */
  .it-card { background: #fff; border-radius: var(--it-card-radius); overflow: hidden; }
  .it-card-header {
    padding: var(--it-card-header-padding); border-bottom: 1px solid var(--it-card-divider);
    display: flex; align-items: center; gap: 8px; justify-content: space-between;
    font-size: var(--it-section-label-size); font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--it-section-label-color);
  }
  .it-card-body { padding: var(--it-card-body-padding); }
  .it-form-row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }

  /* ── FORM INPUTS ── */
  .it-field { display: flex; flex-direction: column; }
  .it-label {
    font-size: var(--it-label-font-size); font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--it-label-color); margin-bottom: 8px;
  }
  .it-input {
    height: var(--it-input-height); border: var(--it-input-border); border-radius: var(--it-input-radius);
    padding: var(--it-input-padding); font-size: var(--it-input-font-size); font-family: var(--font-brand);
    color: var(--color-text-primary); background: #fff;
  }
